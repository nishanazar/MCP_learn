name: Deploy to Hugging Face Spaces

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deploy to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          HF_SPACE_NAME: ${{ secrets.HF_SPACE_NAME }}
        run: |
          git config --global user.email "bot@github.com"
          git config --global user.name "Bot"
          git clone https://huggingface.co/spaces/$HF_USERNAME/$HF_SPACE_NAME hf_space
          cp server.py pyproject.toml uv.lock Dockerfile hf_space/
          cd hf_space
          git add .
          git commit -m "Deploy from GitHub" || echo "No changes"
          git push https://$HF_USERNAME:$HF_TOKEN@huggingface.co/spaces/$HF_USERNAME/$HF_SPACE_NAME main
