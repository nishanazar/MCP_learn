name: Deploy to Hugging Face Spaces

on:
  push:
    branches: [main]
    

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Get code
        uses: actions/checkout@v4

      - name: Deploy 
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          HF_SPACE_NAME: ${{ secrets.HF_SPACE_NAME }}
        run:  |
          git config --global user.email "bot@github.com"
          git config --global user.name "Bot"
       
           
          git clone https://huggingface.co/spaces/$HF_USERNAME/$HF_SPACE_NAME hf
          
          
          # Copy all files from GitHub repo
          cp server.py hf/
          cp pyproject.toml hf/
          cp uv.lock hf/
          cp Dockerfile hf/
          cp client.py hf/

        
          
          # Push changes
          git add .
          git commit -m "Deploy $(date)" || echo "No changes to commit"
          git push https://$HF_USERNAME:$HF_TOKEN@huggingface.co/spaces/$HF_USERNAME/$HF_SPACE_NAME main
          