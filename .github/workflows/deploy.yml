name: Deploy to Hugging Face Spaces

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Get code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --frozen

      - name: Setup Git for Hugging Face
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Deploy to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_NAME: ${{ secrets.HF_SPACE_NAME }}
        run: |
          # Clone the Hugging Face Space
          git clone https://huggingface.co/spaces/$HF_SPACE_NAME hf_space
          cd hf_space
          
          # Copy files from repository
          cp -r ../. .
          
          # Push to Hugging Face Spaces
          git add .
          git commit -m "Deploy from GitHub: ${{ github.sha }}" || echo "No changes to commit"
          git push https://$HF_TOKEN@huggingface.co/spaces/$HF_SPACE_NAME main
